<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jayden Web Design</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #07080c;
      color: white;
      overflow-x: hidden;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: 90%;
      max-width: 1180px;
      margin: auto;
    }

    .glow {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: rgba(80, 120, 255, 0.28);
      filter: blur(120px);
      top: -140px;
      right: -110px;
      z-index: -1;
    }

    .glow2 {
      position: fixed;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: rgba(170, 80, 255, 0.22);
      filter: blur(120px);
      bottom: -120px;
      left: -100px;
      z-index: -1;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 8, 12, 0.7);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    nav {
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 26px;
      list-style: none;
      color: #b9bcc7;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: white;
    }

    .nav-btn {
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      color: #08090d;
      font-weight: 700;
    }

    .hero {
      padding: 110px 0 90px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 50px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      margin-bottom: 24px;
      color: #d9dbea;
      font-size: 0.9rem;
    }

    .badge span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7ea2ff;
      box-shadow: 0 0 15px #7ea2ff;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: -4px;
      margin-bottom: 24px;
    }

    .gradient-text {
      background: linear-gradient(
        90deg,
        #ffffff,
        #7ea2ff,
        #b875ff,
        #ffffff
      );
